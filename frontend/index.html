<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Quorum is a public dashboard for reading live prediction market sentiment."
    />
    <title>Quorum</title>
    <script>
      (() => {
        const storedTheme =
          window.localStorage.getItem('quorum-theme') ??
          window.localStorage.getItem('naijapulse-theme')
        const nextTheme =
          storedTheme === 'light' || storedTheme === 'dark'
            ? storedTheme
            : 'dark'

        document.documentElement.dataset.theme = nextTheme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
